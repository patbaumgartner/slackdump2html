name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect and what actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Project version
      placeholder: e.g. 0.1.0
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.13.6
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04
